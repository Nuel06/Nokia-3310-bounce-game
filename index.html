<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bounce Classic - Level 1 Remake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#8fa870;}
#app{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;}

/* Screen Handlers */
.screen{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* Nokia Red/Blue Aesthetics matched to Walkthrough Images */
#gameScreen{background:#54baff;}
#hud{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:10px;color:#fff;z-index:20;}
#gameCanvas{display:block;image-rendering:pixelated;background:#54baff;}

/* Controls Overlay */
#controls{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 24px;z-index:30;pointer-events:none;}
.cb{width:70px;height:70px;background:rgba(255,255,255,0.25);border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;cursor:pointer;pointer-events:all;user-select:none;}
.cb:active{background:rgba(255,255,255,0.5);}
.cb-j{border-radius:12px;width:90px;font-size:12px;}

/* Popups */
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:40;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.overlay.show{display:flex;}
.ov-box{background:#cc4411;border:4px solid #fff;border-radius:8px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px;color:#fff;text-align:center;}
.nk-btn{background:#fff;color:#cc4411;border:none;padding:10px 20px;font-family:'Press Start 2P';font-size:10px;cursor:pointer;border-radius:4px;}
.nk-btn:active{transform:scale(0.95);}
</style>
</head>
<body>
<div id="app">

  <!-- Menu Screen -->
  <div id="splash" class="screen active" style="background:#cc4411; color:#fff; gap:20px;">
    <h1 style="font-size:24px; text-align:center; line-height:1.6;">BOUNCE<br>CLASSIC</h1>
    <p style="font-size:8px; color:#ffcc00;">LEVEL 1 ACCURATE RECREATION</p>
    <button class="nk-btn" onclick="startLevel1()" style="font-size:14px; padding:12px 24px;">PLAY GAME</button>
  </div>

  <!-- Main Simulator View -->
  <div id="gameScreen" class="screen">
    <div id="hud">
      <div>🔴 X<span id="hLives">3</span></div>
      <div>◎ <span id="hRings">0</span>/<span id="hTotal">4</span></div>
      <div id="hScore">0000000</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="controls">
      <div style="display:flex; gap:16px;">
        <button class="cb" ontouchstart="K.L=true;event.preventDefault()" ontouchend="K.L=false" onmousedown="K.L=true" onmouseup="K.L=false" onmouseleave="K.L=false">◀</button>
        <button class="cb" ontouchstart="K.R=true;event.preventDefault()" ontouchend="K.R=false" onmousedown="K.R=true" onmouseup="K.R=false" onmouseleave="K.R=false">▶</button>
      </div>
      <button class="cb cb-j" ontouchstart="doJump();event.preventDefault()" onmousedown="doJump()">JUMP</button>
    </div>

    <!-- Win/Loss States -->
    <div class="overlay" id="oComplete">
      <div class="ov-box">
        <h2>LEVEL CLEAR!</h2>
        <p>Excellent 3-Star Run</p>
        <button class="nk-btn" onclick="toMenu()">MENU</button>
      </div>
    </div>

    <div class="overlay" id="oGameOver">
      <div class="ov-box">
        <h2>GAME OVER</h2>
        <button class="nk-btn" onclick="startLevel1()">RETRY</button>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';

const T = 40;  // True structural block grid footprint
const BH = 9;  // Viewport row constraints matching screenshots

// Tuned Physics Constants
const GRAV = 0.45;
const ACCEL = 0.24;
const MAX_SPD = 4.5;
const FRIC = 0.88;
const JUMP_FORCE = -9.8;
const JUMP_BIG = -12.0;
const BOUNCE_ELASTICITY = 0.28;

let canvas, ctx;
let ringsGot = 0, totalRings = 4, score = 0, lives = 3;
let gState = 'menu', raf = 0;

let B = { x:0, y:0, vx:0, vy:0, radius:14, angle:0, onGround:false, inflated:false, dead:false };
let camX = 0, respX = 60, respY = 240;
const K = { L: false, R: false };

// Absolute Block-by-Block Blueprint Extracted from Walkthrough Frames
const LEVEL1 = {
  widthInTiles: 52,
  // Solid Block Formations
  blocks: [
    // Flat Baseline Foundation Track Across Entire Level
    {x: 0, y: 8, w: 52, h: 2},
    
    // Screens 1 & 2: Structural Roof Overhang & Initial Jump Pillar
    {x: 0, y: 0, w: 18, h: 5},
    {x: 18, y: 5, w: 4, h: 3}, // Jump Pillar Blockade

    // Screens 3 & 4: Lower Floor track underneath hanging divider element
    {x: 25, y: 0, w: 8, h: 5}, 

    // Screens 5 & 6: Mid-air floating step-up section blocks
    {x: 36, y: 5, w: 5, h: 1}, 
    {x: 43, y: 4, w: 5, h: 1},

    // Far boundary walls closing level geometry context loops
    {x: 0, y: 0, w: 1, h: 8},
    {x: 51, y: 0, w: 1, h: 8}
  ],
  // Entity Placements Matching Coordinates
  rings: [
    {x: 10 * T, y: 6.5 * T, collected: false}, // Screen 1 low floor item
    {x: 28 * T, y: 6.5 * T, collected: false}, // Screen 4 narrow slot hoop
    {x: 38 * T, y: 3.5 * T, collected: false}, // Screen 6 over floating step
    {x: 45 * T, y: 2.0 * T, collected: false}  // Screen 8 high-altitude ring
  ],
  checkpoints: [
    {x: 23 * T, y: 7 * T, hit: false}          // Screen 2 crystal positioner
  ],
  inflators: [
    {x: 34 * T, y: 7 * T, used: false}          // Screen 5 structural pocket floor pump
  ],
  exit: {x: 49 * T, y: 6 * T}
};

function startLevel1() {
  setScreen('gameScreen');
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  
  lives = 3; score = 0; ringsGot = 0;
  respX = 80; respY = 280;
  
  resetBall();
  LEVEL1.rings.forEach(r => r.collected = false);
  LEVEL1.checkpoints.forEach(c => c.hit = false);
  LEVEL1.inflators.forEach(i => i.used = false);
  
  gState = 'playing';
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

function resetBall() {
  B.x = respX; B.y = respY;
  B.vx = 0; B.vy = 0;
  B.inflated = false; B.radius = 14;
  B.dead = false; B.onGround = false;
}

function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toMenu() { gState = 'menu'; setScreen('splash'); }

function resizeCanvas() {
  const gs = document.getElementById('gameScreen');
  canvas.width = gs.clientWidth;
  canvas.height = BH * T; 
}

function doJump() {
  if (B.onGround && !B.dead) {
    B.vy = B.inflated ? JUMP_BIG : JUMP_FORCE;
    B.onGround = false;
  }
}

// ================================================================
//  GAME CYCLE MOTOR
// ================================================================
function loop() {
  if (gState !== 'playing') return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  if (B.dead) return;

  // Horizontal Velocity Interpolation Curves
  if (K.L) { B.vx -= ACCEL; if (B.vx < -MAX_SPD) B.vx = -MAX_SPD; }
  else if (K.R) { B.vx += ACCEL; if (B.vx > MAX_SPD) B.vx = MAX_SPD; }
  else { B.vx *= FRIC; if (Math.abs(B.vx) < 0.1) B.vx = 0; }

  B.vy += GRAV;
  if (B.vy > 12) B.vy = 12;

  // Move and Resolve Collisions
  B.x += B.vx;
  resolveCollisions('x');
  B.y += B.vy;
  B.onGround = false;
  resolveCollisions('y');

  B.angle += (B.vx / B.radius);

  // Dynamic Camera Track Framing
  let idealCam = B.x - canvas.width * 0.4;
  camX += (idealCam - camX) * 0.1;
  camX = Math.max(0, Math.min(LEVEL1.widthInTiles * T - canvas.width, camX));

  // Dynamic Trigger Checking Overlaps
  checkTriggers();
  
  // UI Sync updates
  document.getElementById('hLives').textContent = lives;
  document.getElementById('hRings').textContent = ringsGot;
  document.getElementById('hScore').textContent = String(Math.floor(score)).padStart(7, '0');
}

// ================================================================
//  COLLISION ENGINE
// ================================================================
function resolveCollisions(axis) {
  for (let b of LEVEL1.blocks) {
    let bx = b.x * T, by = b.y * T, bw = b.w * T, bh = b.h * T;
    
    // Check bounding box overlap
    if (B.x + B.radius > bx && B.x - B.radius < bx + bw &&
        B.y + B.radius > by && B.y - B.radius < by + bh) {
      
      if (axis === 'x') {
        if (B.vx > 0) { B.x = bx - B.radius; B.vx = 0; }
        else if (B.vx < 0) { B.x = bx + bw + B.radius; B.vx = 0; }
      } else {
        if (B.vy > 0) { // Moving Downward
          B.y = by - B.radius;
          if (B.vy > 3.0) {
            B.vy = -B.vy * BOUNCE_ELASTICITY; // Apply Elastic Impact Rebound
          } else {
            B.vy = 0; B.onGround = true;
          }
        } else if (B.vy < 0) { // Moving Upward
          B.y = by + bh + B.radius; B.vy = 0;
        }
      }
    }
  }
}

function checkTriggers() {
  // Hoops Rings
  LEVEL1.rings.forEach(r => {
    if (!r.collected && Math.hypot(B.x - r.x, B.y - r.y) < B.radius + 16) {
      r.collected = true; ringsGot++; score += 500;
    }
  });

  // Save State Crystals
  LEVEL1.checkpoints.forEach(c => {
    if (!c.hit && Math.hypot(B.x - c.x, B.y - c.y) < B.radius + 16) {
      c.hit = true; respX = c.x; respY = c.y; score += 200;
    }
  });

  // Size Transformers
  LEVEL1.inflators.forEach(i => {
    if (!i.used && Math.hypot(B.x - i.x, B.y - i.y) < B.radius + 16) {
      i.used = true; B.inflated = true; B.radius = 22; score += 300;
    }
  });

  // Level Clear Evaluation Track
  if (ringsGot >= totalRings) {
    let ex = LEVEL1.exit.x, ey = LEVEL1.exit.y;
    if (Math.hypot(B.x - ex, B.y - ey) < B.radius + 20) {
      gState = 'win';
      document.getElementById('oComplete').classList.add('show');
    }
  }
}

// ================================================================
//  VISUAL GRAPHICS RENDER
// ================================================================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.save();
  ctx.translate(-Math.floor(camX), 0);

  // Draw Structural Brick Groups
  ctx.fillStyle = '#d84818'; 
  LEVEL1.blocks.forEach(b => {
    ctx.fillRect(b.x * T, b.y * T, b.w * T, b.h * T);
    ctx.strokeStyle = '#a02800';
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x * T, b.y * T, b.w * T, b.h * T);
  });

  // Rings
  LEVEL1.rings.forEach(r => {
    if (r.collected) return;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 14, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 4; ctx.stroke();
    ctx.beginPath();
    ctx.arc(r.x, r.y, 14, 0, Math.PI * 2);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  });

  // Checkpoints
  LEVEL1.checkpoints.forEach(c => {
    ctx.fillStyle = c.hit ? '#00ffcc' : '#ff0055';
    ctx.fillRect(c.x - 6, c.y - 12, 12, 24);
  });

  // Inflator
  LEVEL1.inflators.forEach(i => {
    if (i.used) return;
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(i.x - 10, i.y - 4, 20, 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(i.x - 4, i.y - 16, 8, 12);
  });

  // Finish Target Portal Gate
  let ex = LEVEL1.exit.x, ey = LEVEL1.exit.y;
  ctx.fillStyle = (ringsGot >= totalRings) ? '#00ff00' : '#777';
  ctx.fillRect(ex - 15, ey - 30, 30, 30);

  // Ball Actor Representation
  ctx.save();
  ctx.translate(B.x, B.y);
  ctx.rotate(B.angle);
  ctx.beginPath();
  ctx.arc(0, 0, B.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#ff3300'; ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
  // Texture shading lines matching screenshot spheres
  ctx.fillStyle = '#fff'; ctx.fillRect(-B.radius*0.4, -B.radius*0.4, B.radius*0.3, B.radius*0.3);
  ctx.restore();

  ctx.restore();
}

// Keyboard Interface Bindings
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') K.L = true;
  if (e.key === 'ArrowRight' || e.key === 'd') K.R = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') doJump();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') K.L = false;
  if (e.key === 'ArrowRight' || e.key === 'd') K.R = false;
});
</script>
</body>
</html>
